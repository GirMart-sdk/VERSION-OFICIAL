# Configuración recomendada para Nginx en el servidor de la tienda
server {
    listen 80;
    server_name winner-pos.local; # Cambiar por el dominio o IP real
    
    # FORZAR REDIRECCIÓN A HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name winner-pos.local;

    ssl_certificate /c/DEZPY_v01/certs/fullchain.pem;
    ssl_certificate_key /c/DEZPY_v01/certs/privkey.pem;

    # Seguridad de protocolos (Solo TLS modernos)
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Cabeceras de seguridad para pasar la IP real al backend
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Límites de carga
        client_max_body_size 5M;
    }
}