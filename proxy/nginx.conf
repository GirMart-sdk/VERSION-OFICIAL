# Definir zona de límite de peticiones (Protección DoS)
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

server {
    listen 80;
    server_name winnerstore.local;

    # Seguridad de Buffers (Evita ataques de desbordamiento)
    client_body_buffer_size 10K;
    client_header_buffer_size 1k;
    client_max_body_size 5M; # Limitar subida de imágenes a 5MB
    large_client_header_buffers 2 1k;

    # Cabeceras de Seguridad Avanzadas (WAF Level)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self' http: https: data: blob: 'unsafe-inline'" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Bloquear agentes de usuario sospechosos (Bots/Scanners)
    if ($http_user_agent ~* (sqlmap|nikto|w3af|nmap|burpsuite)) {
        return 403;
    }

    # Honeypot Nginx: Bloquear extensiones y directorios sensibles de inmediato
    # Devolvemos 444 para cerrar la conexión sin enviar headers, ahorrando recursos.
    location ~* /(\.git|\.env|\.vscode|phpmyadmin|wp-admin|wp-login\.php|shell\.php|backup.*\.sql)$ {
        return 444;
    }

    # Compresión Gzip para mejorar la velocidad de carga del POS y E-commerce
    gzip on;
    gzip_types text/plain application/json application/javascript text/css;

    # Servir imágenes directamente desde la carpeta de uploads (Descarga de CPU de Node.js)
    # Nota: Ajustar la ruta física según el despliegue final
    location /uploads/ {
        alias c:/DEZPY_v01/uploads/;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # Proxy inverso hacia el backend de Express (puerto 3000)
    location / {
        # Aplicar límite de peticiones
        limit_req zone=api_limit burst=20 nodelay;

        # Restringir métodos HTTP (Solo los necesarios para la App)
        if ($request_method !~ ^(GET|POST|PUT|DELETE|PATCH)$ ) {
            return 405;
        }

        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        
        # Seguridad: Ocultar detalles del servidor interno
        proxy_hide_header X-Powered-By;
    }
}