<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WINNER - Nueva Contraseña</title>
    <style>
        :root { --accent: #e8ff47; --bg: #0a0a0a; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background: #111;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid #222;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        h1 { letter-spacing: 5px; margin-bottom: 30px; }
        .input-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #888; margin-bottom: 8px; text-transform: uppercase; }
        input {
            width: 100%;
            padding: 12px;
            background: #000;
            border: 1px solid #333;
            color: white;
            border-radius: 6px;
            box-sizing: border-box;
        }
        input:focus { border-color: var(--accent); outline: none; }
        button {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            border: none;
            color: black;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button:hover:not(:disabled) { transform: scale(1.02); }
        .message { margin-top: 20px; font-size: 14px; padding: 10px; border-radius: 4px; display: none; }
        .error { background: rgba(255,0,0,0.1); color: #ff4444; border: 1px solid #ff4444; }
        .success { background: rgba(0,255,0,0.1); color: #00ff00; border: 1px solid #00ff00; }
    </style>
</head>
<body>
    <div class="container">
        <h1>WINNER</h1>
        <p style="color: #666; font-size: 14px; margin-bottom: 30px;">Ingresa tu nueva contraseña para acceder al sistema.</p>
        
        <form id="resetForm">
            <div class="input-group">
                <label>Nueva Contraseña</label>
                <input type="password" id="newPass" required minlength="6" placeholder="••••••••">
            </div>
            <div class="input-group">
                <label>Confirmar Contraseña</label>
                <input type="password" id="confirmPass" required minlength="6" placeholder="••••••••">
            </div>
            <button type="submit" id="btnSubmit">ACTUALIZAR CONTRASEÑA</button>
        </form>
        
        <div id="msg" class="message"></div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');
        const form = document.getElementById('resetForm');
        const msg = document.getElementById('msg');
        const btn = document.getElementById('btnSubmit');
        console.log("🔍 [Auth] Token detectado en URL:", token ? "SÍ" : "NO");

        if (!token) {
            msg.textContent = "❌ Token no encontrado. El enlace es inválido.";
            msg.className = "message error";
            msg.style.display = "block";
            form.style.display = "none";
        }

        form.onsubmit = async (e) => {
            e.preventDefault();
            const newPassword = document.getElementById('newPass').value;
            const confirmPassword = document.getElementById('confirmPass').value;

            if (newPassword !== confirmPassword) {
                msg.textContent = "⚠️ Las contraseñas no coinciden.";
                msg.className = "message error";
                msg.style.display = "block";
                return;
            }

            // Validación de complejidad básica
            const strongRegex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*[0-9])(?=.*[!@#$%^&*])(?=.{8,})/;
            if (!strongRegex.test(newPassword)) {
                msg.textContent = "⚠️ La contraseña debe tener al menos 8 caracteres, incluir mayúsculas, números y un símbolo.";
                msg.className = "message error";
                msg.style.display = "block";
                return;
            }

            btn.disabled = true;
            btn.textContent = "PROCESANDO...";

            try {
                const res = await fetch('/api/auth/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });
                const data = await res.json();

                if (data.success) {
                    msg.textContent = "✅ ¡Éxito! Redirigiendo al login...";
                    msg.className = "message success";
                    msg.style.display = "block";
                    setTimeout(() => window.location.href = '/admin-panel.html', 3000);
                } else {
                    throw new Error(data.error || "Error al actualizar");
                }
            } catch (err) {
                msg.textContent = "❌ " + err.message;
                msg.className = "message error";
                msg.style.display = "block";
                btn.disabled = false;
                btn.textContent = "ACTUALIZAR CONTRASEÑA";
            }
        };
    </script>
</body>
</html>
